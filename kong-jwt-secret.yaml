apiVersion: v1
kind: Secret
metadata:
  name: grade-jwt-credential
  namespace: grade-demo
  labels:
    konghq.com/credential: jwt   # Tells Kong this secret holds a JWT credential
type: Opaque
stringData:
  kongCredType: jwt
  # 'key' maps to the JWT 'iss' (issuer) claim — Kong matches this to the incoming token
  key: "grade-submission-issuer"
  # Signing algorithm — HS256 (HMAC-SHA256) for symmetric shared-secret signing
  algorithm: "HS256"
  # Shared secret used to sign and verify JWT tokens
  # IMPORTANT: Replace this with a cryptographically strong secret in production
  # Generate one with: openssl rand -base64 64
  secret: "grade-super-secret-jwt-signing-key-replace-in-production-min32chars"
